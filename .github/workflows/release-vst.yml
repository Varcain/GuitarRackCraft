# Builds the VST edition ("full" flavor, HAS_VST_HOST=true) release APK and
# publishes it as a GitHub Release. This workflow has NO Play Store path on
# purpose: it never builds an AAB and never uploads to Google Play. For Play
# Store deployment, use build-deploy.yml instead.

name: Release VST APK

on:
  workflow_dispatch:
    inputs:
      version_name:
        description: "Version name (e.g. 1.0.0, 1.0.0-beta.1)"
        required: true
        type: string
      version_code:
        description: "Version code (integer, must be higher than previous release)"
        required: true
        type: string
      create_github_release:
        description: "Create a GitHub Release"
        required: true
        type: boolean
        default: true

concurrency:
  group: release-vst

env:
  ANDROID_SDK_ROOT: /usr/local/lib/android/sdk
  NDK_VSTHOST: 26.1.10909125
  NDK_NATIVE: 27.2.12479018
  GRADLE_OPTS: -Dorg.gradle.daemon=false
  COMMON_APT: >-
    build-essential autoconf automake libtool bison flex gettext gperf
    pkg-config cmake ninja-build meson patchelf patch python3 python3-pip
    python3-mako git xz-utils ca-certificates curl
  X11_APT: >-
    libx11-dev libxext-dev libxrender-dev libxrandr-dev libxi-dev
    libxfixes-dev libxcursor-dev libxxf86vm-dev libfreetype-dev
    fonts-liberation fonts-dejavu
  NATIVE_APT: >-
    gcc-mingw-w64-x86-64 gcc-mingw-w64-i686 g++-mingw-w64-x86-64
    ocaml ocamlbuild ocaml-findlib libnum-ocaml-dev faust libboost-dev ccache

jobs:
  keys:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    outputs:
      llvm: ${{ steps.k.outputs.llvm }}
      llvm_android: ${{ steps.k.outputs.llvm_android }}
      x11: ${{ steps.k.outputs.x11 }}
      winedeps: ${{ steps.k.outputs.winedeps }}
      wine: ${{ steps.k.outputs.wine }}
      fex: ${{ steps.k.outputs.fex }}
      dxvk: ${{ steps.k.outputs.dxvk }}
      mesa: ${{ steps.k.outputs.mesa }}
    steps:
      - uses: actions/checkout@v4
      - name: Compute VST host cache keys
        id: k
        run: |
          os=${{ runner.os }}
          gl()  { git rev-parse "HEAD:$1" 2>/dev/null || echo none; }
          h16() { sha256sum | cut -c1-16; }

          LLVM_C=$(gl vsthost_lib/external/llvm-mingw)
          echo "llvm=llvm-$os-$LLVM_C" >> "$GITHUB_OUTPUT"

          LLVMA_H=$( cat vsthost_lib/scripts/fetch-llvm-source.sh \
                         vsthost_lib/scripts/build-llvm-android.sh | h16)
          echo "llvm_android=llvm-android-$os-$LLVMA_H-ndk${NDK_VSTHOST}" >> "$GITHUB_OUTPUT"

          WD=$(cat vsthost_lib/scripts/fetch-x11-libs.sh \
                   vsthost_lib/scripts/build-android-libs.sh \
                   vsthost_lib/scripts/build-gnutls-android.sh | h16)
          echo "winedeps=winedeps-$os-$WD-ndk${NDK_VSTHOST}" >> "$GITHUB_OUTPUT"

          X11_K=$( { cat cmake/targets/x11_sysroot.cmake vsthost_lib/scripts/build-all.sh; \
                     git rev-parse HEAD:3rd_party/x11; } | h16)
          echo "x11=x11-$os-$X11_K-ndk${NDK_NATIVE}" >> "$GITHUB_OUTPUT"

          WINE_C=$(gl vsthost_lib/external/wine-upstream)
          WINE_H=$( { find vsthost_lib/patches/wine -type f -name '*.patch' | sort | xargs -r cat; \
                      cat vsthost_lib/scripts/build-wine-pe.sh \
                          vsthost_lib/scripts/build-wine-android.sh \
                          vsthost_lib/scripts/apply-wine-patches.sh; } | h16)
          echo "wine=wine-$os-$WINE_C-$WINE_H-$LLVM_C" >> "$GITHUB_OUTPUT"

          FEX_C=$(gl vsthost_lib/external/fex-upstream)
          FEX_H=$(cat vsthost_lib/scripts/build-fex-pe.sh | h16)
          echo "fex=fex-$os-$FEX_C-$FEX_H-$LLVM_C" >> "$GITHUB_OUTPUT"

          DXVK_C=$(gl vsthost_lib/external/dxvk)
          VKH_C=$(gl vsthost_lib/external/Vulkan-Headers)
          GLSLANG_C=$(gl vsthost_lib/external/glslang)
          DXVK_H=$( { find vsthost_lib/patches/dxvk -type f -name '*.patch' 2>/dev/null | sort | xargs -r cat; \
                      cat vsthost_lib/scripts/build-dxvk.sh; } | h16)
          echo "dxvk=dxvk-$os-$DXVK_C-$VKH_C-$GLSLANG_C-$DXVK_H-$LLVM_C" >> "$GITHUB_OUTPUT"

          MESA_C=$(gl 3rd_party/mesa)
          MESA_H=$( { find vsthost_lib/patches/mesa -type f -name '*.patch' 2>/dev/null | sort | xargs -r cat; \
                      cat vsthost_lib/scripts/build-mesa-zink.sh vsthost_lib/scripts/build-libdrm-android.sh; } | h16)
          echo "mesa=mesa-$os-$MESA_C-$MESA_H-ndk${NDK_VSTHOST}" >> "$GITHUB_OUTPUT"

  llvm:
    needs: keys
    runs-on: ubuntu-latest
    timeout-minutes: 150
    steps:
      - uses: actions/checkout@v4
      - name: Cache llvm-mingw install
        id: cache
        uses: actions/cache@v4
        with:
          path: vsthost_lib/external/llvm-mingw/install
          key: ${{ needs.keys.outputs.llvm }}
      - name: Free disk space
        if: steps.cache.outputs.cache-hit != 'true'
        uses: jlumbroso/free-disk-space@main
        with: { android: true, tool-cache: false, dotnet: true, haskell: true, large-packages: true, docker-images: true, swap-storage: true }
      - name: Build llvm-mingw
        if: steps.cache.outputs.cache-hit != 'true'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends $COMMON_APT
          git submodule update --init \
            vsthost_lib/external/llvm-mingw \
            vsthost_lib/external/wine-upstream \
            vsthost_lib/external/fex-upstream
          cd vsthost_lib && bash scripts/build-all.sh llvm

  llvm-android:
    needs: keys
    runs-on: ubuntu-latest
    timeout-minutes: 180
    steps:
      - uses: actions/checkout@v4
      - name: Cache android LLVM install
        id: cache
        uses: actions/cache@v4
        with:
          path: vsthost_lib/external/llvm-android/install-android-arm64
          key: ${{ needs.keys.outputs.llvm_android }}
      - name: Free disk space
        if: steps.cache.outputs.cache-hit != 'true'
        uses: jlumbroso/free-disk-space@main
        with: { android: false, tool-cache: false, dotnet: true, haskell: true, large-packages: true, docker-images: true, swap-storage: true }
      - name: System deps + host LLVM 18 + NDK
        if: steps.cache.outputs.cache-hit != 'true'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends $COMMON_APT llvm-18
          yes | "$ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager" --licenses >/dev/null || true
          "$ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager" "ndk;${NDK_VSTHOST}"
      - name: Fetch + cross-build LLVM 18.1.3
        if: steps.cache.outputs.cache-hit != 'true'
        env:
          ANDROID_NDK: ${{ env.ANDROID_SDK_ROOT }}/ndk/${{ env.NDK_VSTHOST }}
        run: |
          export HOST_LLVM_TBLGEN="$(command -v llvm-tblgen-18 || echo /usr/lib/llvm-18/bin/llvm-tblgen)"
          cd vsthost_lib
          bash scripts/fetch-llvm-source.sh
          bash scripts/build-llvm-android.sh

  x11:
    needs: keys
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
      - name: Cache X11 sysroot
        id: x11-cache
        uses: actions/cache@v4
        with:
          path: build/x11_ui
          key: ${{ needs.keys.outputs.x11 }}
      - name: System deps + NDK
        if: steps.x11-cache.outputs.cache-hit != 'true'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends $COMMON_APT $X11_APT $NATIVE_APT
          yes | "$ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager" --licenses >/dev/null || true
          "$ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager" "ndk;${NDK_NATIVE}"
      - name: Init X11/GL submodules
        if: steps.x11-cache.outputs.cache-hit != 'true'
        run: git submodule update --init --recursive 3rd_party/x11 3rd_party/expat 3rd_party/mesa
      - name: Build X11 sysroot
        if: steps.x11-cache.outputs.cache-hit != 'true'
        env:
          ANDROID_NDK: ${{ env.ANDROID_SDK_ROOT }}/ndk/${{ env.NDK_NATIVE }}
        run: cd vsthost_lib && bash scripts/build-all.sh x11

  wine:
    needs: [keys, llvm, x11]
    runs-on: ubuntu-latest
    timeout-minutes: 300
    steps:
      - uses: actions/checkout@v4
      - name: Cache winedeps
        id: winedeps-cache
        uses: actions/cache@v4
        with:
          path: |
            vsthost_lib/toolchain/x11-libs
            vsthost_lib/toolchain/x11-headers
            vsthost_lib/toolchain/wine-fonts
            vsthost_lib/toolchain/android-libs
            vsthost_lib/toolchain/gnutls-android-arm64
          key: ${{ needs.keys.outputs.winedeps }}
      - name: Cache wine output tar
        id: wine-cache
        uses: actions/cache@v4
        with:
          path: vsthost_lib/wine-android-out.tar
          key: ${{ needs.keys.outputs.wine }}
      - name: Free disk space
        if: steps.winedeps-cache.outputs.cache-hit != 'true' || steps.wine-cache.outputs.cache-hit != 'true'
        uses: jlumbroso/free-disk-space@main
        with: { android: false, tool-cache: false, dotnet: true, haskell: true, large-packages: true, docker-images: true, swap-storage: true }
      - name: System deps + NDK
        if: steps.winedeps-cache.outputs.cache-hit != 'true' || steps.wine-cache.outputs.cache-hit != 'true'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends $COMMON_APT $X11_APT
          yes | "$ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager" --licenses >/dev/null || true
          "$ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager" "ndk;${NDK_VSTHOST}"
      - name: Build winedeps
        if: steps.winedeps-cache.outputs.cache-hit != 'true'
        run: cd vsthost_lib && bash scripts/build-all.sh winedeps
      - name: Restore llvm-mingw
        if: steps.wine-cache.outputs.cache-hit != 'true'
        uses: actions/cache/restore@v4
        with:
          path: vsthost_lib/external/llvm-mingw/install
          key: ${{ needs.keys.outputs.llvm }}
          fail-on-cache-miss: true
      - name: Restore X11 sysroot
        if: steps.wine-cache.outputs.cache-hit != 'true'
        uses: actions/cache/restore@v4
        with:
          path: build/x11_ui
          key: ${{ needs.keys.outputs.x11 }}
          fail-on-cache-miss: true
      - name: Build wine + stage lean output tar
        if: steps.wine-cache.outputs.cache-hit != 'true'
        env:
          ANDROID_NDK: ${{ env.ANDROID_SDK_ROOT }}/ndk/${{ env.NDK_VSTHOST }}
        run: |
          git submodule update --init vsthost_lib/external/wine-upstream
          cd vsthost_lib
          bash scripts/build-all.sh wine
          tar --exclude='*.o' --exclude='*.a' --exclude='*.cross.o' \
              -cf wine-android-out.tar -C external/wine-upstream build-android-arm64

  fex:
    needs: [keys, llvm]
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4
      - name: Cache FEX Bin
        id: cache
        uses: actions/cache@v4
        with:
          path: |
            vsthost_lib/external/fex-upstream/build-arm64ec/Bin
            vsthost_lib/external/fex-upstream/build-wow64/Bin
          key: ${{ needs.keys.outputs.fex }}
      - name: Free disk space
        if: steps.cache.outputs.cache-hit != 'true'
        uses: jlumbroso/free-disk-space@main
        with: { android: true, tool-cache: false, dotnet: true, haskell: true, large-packages: true, docker-images: true, swap-storage: true }
      - name: Restore llvm-mingw
        if: steps.cache.outputs.cache-hit != 'true'
        uses: actions/cache/restore@v4
        with:
          path: vsthost_lib/external/llvm-mingw/install
          key: ${{ needs.keys.outputs.llvm }}
          fail-on-cache-miss: true
      - name: Build FEX
        if: steps.cache.outputs.cache-hit != 'true'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends $COMMON_APT
          git submodule update --init --recursive vsthost_lib/external/fex-upstream
          cd vsthost_lib && bash scripts/build-all.sh fex

  dxvk:
    needs: [keys, llvm]
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
      - name: Cache DXVK assets
        id: cache
        uses: actions/cache@v4
        with:
          path: vsthost_lib/src/main/assets/dxvk
          key: ${{ needs.keys.outputs.dxvk }}
      - name: Free disk space
        if: steps.cache.outputs.cache-hit != 'true'
        uses: jlumbroso/free-disk-space@main
        with: { android: true, tool-cache: false, dotnet: true, haskell: true, large-packages: true, docker-images: true, swap-storage: true }
      - name: Restore llvm-mingw
        if: steps.cache.outputs.cache-hit != 'true'
        uses: actions/cache/restore@v4
        with:
          path: vsthost_lib/external/llvm-mingw/install
          key: ${{ needs.keys.outputs.llvm }}
          fail-on-cache-miss: true
      - name: Build DXVK
        if: steps.cache.outputs.cache-hit != 'true'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends $COMMON_APT
          git submodule update --init --recursive \
            vsthost_lib/external/dxvk vsthost_lib/external/Vulkan-Headers \
            vsthost_lib/external/glslang
          cd vsthost_lib && bash scripts/build-all.sh dxvk

  mesa:
    needs: keys
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4
      - name: Cache Mesa-Zink asset
        id: cache
        uses: actions/cache@v4
        with:
          path: vsthost_lib/src/main/assets/mesa-zink-libs.tar.gz
          key: ${{ needs.keys.outputs.mesa }}
      - name: Free disk space
        if: steps.cache.outputs.cache-hit != 'true'
        uses: jlumbroso/free-disk-space@main
        with: { android: false, tool-cache: false, dotnet: true, haskell: true, large-packages: true, docker-images: true, swap-storage: true }
      - name: Build Mesa-Zink
        if: steps.cache.outputs.cache-hit != 'true'
        env:
          ANDROID_NDK: ${{ env.ANDROID_SDK_ROOT }}/ndk/${{ env.NDK_VSTHOST }}
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends $COMMON_APT
          yes | "$ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager" --licenses >/dev/null || true
          "$ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager" "ndk;${NDK_VSTHOST}"
          git submodule update --init 3rd_party/mesa
          cd vsthost_lib && bash scripts/build-all.sh mesa

  release-vst:
    needs: [keys, wine, fex, dxvk, mesa, x11, llvm-android]
    runs-on: ubuntu-latest
    timeout-minutes: 180
    permissions:
      contents: write

    steps:
      # ── 1. Checkout & submodules ────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Restore submodule cache
        id: submodule-cache
        uses: actions/cache/restore@v4
        with:
          path: .git/modules
          key: submodules-${{ runner.os }}-${{ hashFiles('.gitmodules') }}-${{ github.sha }}
          restore-keys: |
            submodules-${{ runner.os }}-${{ hashFiles('.gitmodules') }}-

      - name: Initialize submodules
        run: git submodule update --init --recursive --depth 1

      - name: Save submodule cache
        if: steps.submodule-cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@v4
        with:
          path: .git/modules
          key: submodules-${{ runner.os }}-${{ hashFiles('.gitmodules') }}-${{ github.sha }}

      # ── 2. System dependencies ───────────────────────────────────────────
      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends $COMMON_APT $X11_APT $NATIVE_APT

      # ── 3. JDK 17 ───────────────────────────────────────────────────────
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      # ── 4. Android SDK components (skip already-installed) ─────────────
      - name: Install Android SDK components (both NDKs)
        run: |
          SDKMGR="$ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager"
          yes | "$SDKMGR" --licenses >/dev/null || true
          for pkg in "ndk;${NDK_NATIVE}" "ndk;${NDK_VSTHOST}" \
                     "cmake;3.22.1" "platforms;android-34" "build-tools;34.0.0"; do
            "$SDKMGR" "$pkg"
          done

      # ── 5. VST host component caches ─────────────────────────────────────
      # Restore the component outputs produced by this workflow's cache jobs
      # before staging :vsthost_lib into the full APK.
      - name: Restore winedeps
        uses: actions/cache/restore@v4
        with:
          path: |
            vsthost_lib/toolchain/x11-libs
            vsthost_lib/toolchain/x11-headers
            vsthost_lib/toolchain/wine-fonts
            vsthost_lib/toolchain/android-libs
            vsthost_lib/toolchain/gnutls-android-arm64
          key: ${{ needs.keys.outputs.winedeps }}
          fail-on-cache-miss: true

      - name: Restore wine output tar
        uses: actions/cache/restore@v4
        with:
          path: vsthost_lib/wine-android-out.tar
          key: ${{ needs.keys.outputs.wine }}
          fail-on-cache-miss: true

      - name: Restore FEX Bin
        uses: actions/cache/restore@v4
        with:
          path: |
            vsthost_lib/external/fex-upstream/build-arm64ec/Bin
            vsthost_lib/external/fex-upstream/build-wow64/Bin
          key: ${{ needs.keys.outputs.fex }}
          fail-on-cache-miss: true

      - name: Restore DXVK assets
        uses: actions/cache/restore@v4
        with:
          path: vsthost_lib/src/main/assets/dxvk
          key: ${{ needs.keys.outputs.dxvk }}
          fail-on-cache-miss: true

      - name: Restore Mesa-Zink asset
        uses: actions/cache/restore@v4
        with:
          path: vsthost_lib/src/main/assets/mesa-zink-libs.tar.gz
          key: ${{ needs.keys.outputs.mesa }}
          fail-on-cache-miss: true

      - name: Restore X11 sysroot
        uses: actions/cache/restore@v4
        with:
          path: build/x11_ui
          key: ${{ needs.keys.outputs.x11 }}
          fail-on-cache-miss: true

      - name: Restore android LLVM install
        uses: actions/cache/restore@v4
        with:
          path: vsthost_lib/external/llvm-android/install-android-arm64
          key: ${{ needs.keys.outputs.llvm_android }}
          fail-on-cache-miss: true

      - name: Unpack wine output into build dir
        run: |
          tar -xf vsthost_lib/wine-android-out.tar -C vsthost_lib/external/wine-upstream
          test -x vsthost_lib/external/wine-upstream/build-android-arm64/loader/wine

      # ── 6. Cache native build ────────────────────────────────────────────
      - name: Compute native cache key
        id: native-cache-key
        run: |
          # Hash build script, cmake configs, and patches
          FILES_HASH=$(cat \
            build.sh \
            $(find cmake -name '*.cmake' -o -name 'CMakeLists.txt' -o -name 'CMakePresets.json' | sort) \
            $(find 3rd_party/patches -name '*.patch' 2>/dev/null | sort) \
            | sha256sum | cut -d' ' -f1)
          # Hash submodule commits
          SUBMOD_HASH=$(git submodule status | sha256sum | cut -d' ' -f1)
          echo "key=native-${{ runner.os }}-${FILES_HASH}-${SUBMOD_HASH}" >> "$GITHUB_OUTPUT"

      - name: Restore native build cache
        id: native-cache
        uses: actions/cache/restore@v4
        with:
          path: |
            build/prebuild
            build/shared
            build/aidadsp
            build/aidax_full
            build/nam
            build/lv2
            build/x11_ui
            build/mesa
            build/fftw3
            build/fftw3-codelets
            build/neuralrack
            build/impulseloader
            build/xdarkterror
            build/xtinyterror
            build/collisiondrive
            build/metaltone
            build/gxcabsim
            build/modamptk
            build/fatfrog
            build/lv2_wrapper
            app/src/main/jniLibs
            app/src/full/jniLibs
            app/src/main/assets
            app/src/main/cpp/libs
            gxplugins_pack/src/main/assets/plugins
            neural_pack/src/main/assets/plugins
            brummer_pack/src/main/assets/plugins
          key: ${{ steps.native-cache-key.outputs.key }}
          # NO restore-keys on purpose (mirrors build-vst-full.yml): a prefix /
          # partial restore can bring back a stale autotools tree (e.g.
          # build/x11_ui/libX11 configured with the previous CONFIGURE_ARGS) and
          # fail the in-place reconfigure. Exact-key-only means a config change
          # misses cleanly and build.sh does a clean build; ccache keeps it fast.

      # ── 7. ccache ─────────────────────────────────────────────────────────
      - name: Setup ccache
        run: |
          ccache --set-config=max_size=2G
          ccache --set-config=compression=true
          ccache --set-config=compression_level=6
          ccache --set-config=sloppiness=include_file_mtime,include_file_ctime,time_macros,file_stat_matches,file_stat_matches_ctime
          ccache --set-config=hash_dir=false
          ccache --zero-stats

      - name: Restore ccache
        id: ccache-restore
        uses: actions/cache/restore@v4
        with:
          path: ~/.cache/ccache
          key: ccache-${{ runner.os }}-${{ github.sha }}
          restore-keys: |
            ccache-${{ runner.os }}-

      - name: Set up meson >= 1.4 for lavapipe
        run: |
          sudo apt-get install -y --no-install-recommends python3-venv
          python3 -m venv vsthost_lib/.cache/meson-venv
          vsthost_lib/.cache/meson-venv/bin/pip install --quiet --upgrade pip
          vsthost_lib/.cache/meson-venv/bin/pip install --quiet 'meson==1.7.2'
          vsthost_lib/.cache/meson-venv/bin/meson --version

      - name: Stage vsthost (turnip + adrenotools + hosts + pack)
        env:
          ANDROID_NDK: ${{ env.ANDROID_SDK_ROOT }}/ndk/${{ env.NDK_VSTHOST }}
        run: cd vsthost_lib && bash scripts/build-all.sh turnip adrenotools hosts pack

      # ── 8. Native build (Ninja handles incrementality) ──────────────────
      - name: Build native libraries
        run: ./build.sh full
        env:
          ANDROID_NDK: ${{ env.ANDROID_SDK_ROOT }}/ndk/${{ env.NDK_NATIVE }}
          NATIVE_CACHE_EXACT: ${{ steps.native-cache.outputs.cache-hit }}

      - name: Dump ExternalProject logs on failure
        if: failure()
        run: for f in build/prebuild/*/src/*/stamp/*-*.log; do [ -f "$f" ] && echo "=== $f ===" && cat "$f"; done || true

      - name: Show ccache stats
        if: always()
        run: ccache --show-stats

      - name: Save native build cache
        if: "!cancelled() && steps.native-cache.outputs.cache-hit != 'true'"
        uses: actions/cache/save@v4
        with:
          path: |
            build/prebuild
            build/shared
            build/aidadsp
            build/aidax_full
            build/nam
            build/lv2
            build/x11_ui
            build/mesa
            build/fftw3
            build/fftw3-codelets
            build/neuralrack
            build/impulseloader
            build/xdarkterror
            build/xtinyterror
            build/collisiondrive
            build/metaltone
            build/gxcabsim
            build/modamptk
            build/fatfrog
            build/lv2_wrapper
            app/src/main/jniLibs
            app/src/full/jniLibs
            app/src/main/assets
            app/src/main/cpp/libs
            gxplugins_pack/src/main/assets/plugins
            neural_pack/src/main/assets/plugins
            brummer_pack/src/main/assets/plugins
          key: ${{ steps.native-cache-key.outputs.key }}

      - name: Save ccache
        if: "!cancelled() && steps.ccache-restore.outputs.cache-hit != 'true'"
        uses: actions/cache/save@v4
        with:
          path: ~/.cache/ccache
          key: ccache-${{ runner.os }}-${{ github.sha }}

      # ── 9. Decode release keystore ───────────────────────────────────────
      - name: Decode upload keystore
        run: |
          if [ -z "$KEYSTORE_B64" ]; then
            echo "::error::KEYSTORE_BASE64 secret is not set"
            exit 1
          fi
          echo "$KEYSTORE_B64" | base64 -d > "$RUNNER_TEMP/upload.keystore"
          # Verify the keystore is valid
          keytool -list -keystore "$RUNNER_TEMP/upload.keystore" \
            -storepass "${{ secrets.KEYSTORE_PASSWORD }}" -storetype JKS 2>&1 | head -5 \
            || keytool -list -keystore "$RUNNER_TEMP/upload.keystore" \
              -storepass "${{ secrets.KEYSTORE_PASSWORD }}" -storetype PKCS12 2>&1 | head -5
          echo "Keystore decoded and validated OK"
        env:
          KEYSTORE_B64: ${{ secrets.KEYSTORE_BASE64 }}

      # ── 10. Patch version ────────────────────────────────────────────────
      - name: Patch versionCode and versionName
        run: |
          sed -i \
            -e 's/versionCode = [0-9]*/versionCode = ${{ inputs.version_code }}/' \
            -e 's/versionName = ".*"/versionName = "${{ inputs.version_name }}"/' \
            app/build.gradle.kts

      # ── 11. Build the VST ("full" flavor) release APK ────────────────────
      #     assembleFullRelease only — no playstore bundle/AAB is produced.
      - name: Restore Gradle cache
        id: gradle-cache
        uses: actions/cache/restore@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
            ~/.gradle/build-cache
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle.kts', 'gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: |
            gradle-${{ runner.os }}-

      - name: Build VST release APK
        run: |
          ./gradlew assembleFullRelease \
            -PRELEASE_STORE_FILE=${{ runner.temp }}/upload.keystore \
            -PRELEASE_STORE_PASSWORD=${{ secrets.KEYSTORE_PASSWORD }} \
            -PRELEASE_KEY_ALIAS=${{ secrets.KEY_ALIAS }} \
            -PRELEASE_KEY_PASSWORD=${{ secrets.KEY_PASSWORD }}

      - name: Save Gradle cache
        if: "!cancelled() && steps.gradle-cache.outputs.cache-hit != 'true'"
        uses: actions/cache/save@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
            ~/.gradle/build-cache
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle.kts', 'gradle/wrapper/gradle-wrapper.properties') }}

      # ── 12. Upload APK artifact ──────────────────────────────────────────
      - name: Find built APK
        id: artifacts
        run: |
          APK=$(find app/build/outputs/apk/full/release -name '*.apk' | head -1)
          if [ -z "$APK" ]; then
            echo "::error::No full/release APK found"
            exit 1
          fi
          echo "apk=$APK" >> "$GITHUB_OUTPUT"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: guitarrackcraft-vst-${{ inputs.version_name }}-apk
          path: ${{ steps.artifacts.outputs.apk }}

      # ── 13. GitHub Release ───────────────────────────────────────────────
      - name: Create GitHub Release
        if: inputs.create_github_release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ inputs.version_name }}
          name: Guitar RackCraft v${{ inputs.version_name }}
          files: ${{ steps.artifacts.outputs.apk }}
          prerelease: ${{ contains(inputs.version_name, 'beta') || contains(inputs.version_name, 'alpha') || contains(inputs.version_name, 'rc') }}
          generate_release_notes: true

      # ── 14. Cleanup ──────────────────────────────────────────────────────
      - name: Remove upload keystore
        if: always()
        run: rm -f "$RUNNER_TEMP/upload.keystore"
