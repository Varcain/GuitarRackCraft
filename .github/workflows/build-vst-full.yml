#
# Builds the COMPLETE full-flavor debug APK for the VST-hosting branch, but
# SPLIT into separately-cacheable jobs so the two long poles — llvm-mingw and
# wine — are *restored* (not rebuilt) when their inputs are unchanged.
#
#   keys ─┬─> llvm ─┬─> wine ──┐
#         │         ├─> fex ───┤
#         │         └─> dxvk ──┤
#         └─> mesa ────────────┤
#                              v
#                           assemble ──> APK artifact
#
# Each component build maps 1:1 to a `vsthost_lib/scripts/build-all.sh <phase>`
# invocation and is keyed on (submodule commit + patch/script hashes). On a
# cache hit the build step is SKIPPED entirely. Handoff to `assemble` is
# cache-only (no per-run artifacts except the final APK); to stay under the
# 10 GB/repo cache budget, each cache holds final outputs only — never .o/.a
# intermediates (wine, the only heavy one, ships a lean .tar minus *.o/*.a).
#
# Cold first run is ~4-5h (everything builds); subsequent runs with unchanged
# wine/llvm/fex/dxvk/mesa drop to ~minutes + the native/gradle steps.

name: Build VST Full APK

on:
  workflow_dispatch:

concurrency:
  group: build-vst-full-${{ github.ref }}
  cancel-in-progress: true

env:
  ANDROID_SDK_ROOT: /usr/local/lib/android/sdk
  NDK_VSTHOST: 26.1.10909125        # wine/FEX/mesa + vsthost_lib gradle
  NDK_NATIVE: 27.2.12479018         # ./build.sh full + app CMake
  GRADLE_OPTS: -Dorg.gradle.daemon=false
  # apt dependency groups, reused across jobs (GitHub Actions has no YAML anchors).
  COMMON_APT: >-
    build-essential autoconf automake libtool bison flex gettext gperf
    pkg-config cmake ninja-build meson patchelf patch python3 python3-pip
    python3-mako git xz-utils ca-certificates curl
  X11_APT: >-
    libx11-dev libxext-dev libxrender-dev libxrandr-dev libxi-dev
    libxfixes-dev libxcursor-dev libxxf86vm-dev libfreetype-dev
    fonts-liberation fonts-dejavu
  NATIVE_APT: >-
    gcc-mingw-w64-x86-64 gcc-mingw-w64-i686 g++-mingw-w64-x86-64
    ocaml ocamlbuild ocaml-findlib libnum-ocaml-dev faust libboost-dev ccache

jobs:
  # ── Compute every cache key ONCE so all jobs agree. Needs no submodule
  #    checkout — `git rev-parse HEAD:<path>` reads the pinned gitlink commit
  #    straight from the superproject tree. ────────────────────────────────
  keys:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    outputs:
      llvm: ${{ steps.k.outputs.llvm }}
      x11: ${{ steps.k.outputs.x11 }}
      winedeps: ${{ steps.k.outputs.winedeps }}
      wine: ${{ steps.k.outputs.wine }}
      fex: ${{ steps.k.outputs.fex }}
      dxvk: ${{ steps.k.outputs.dxvk }}
      mesa: ${{ steps.k.outputs.mesa }}
    steps:
      - uses: actions/checkout@v4    # submodules: false (default) — fast
      - name: Compute cache keys
        id: k
        run: |
          os=${{ runner.os }}
          gl()  { git rev-parse "HEAD:$1" 2>/dev/null || echo none; }   # gitlink commit
          h16() { sha256sum | cut -c1-16; }                              # stdin -> short hash

          LLVM_C=$(gl vsthost_lib/external/llvm-mingw)
          echo "llvm=llvm-$os-$LLVM_C" >> "$GITHUB_OUTPUT"

          WD=$(cat vsthost_lib/scripts/fetch-x11-libs.sh \
                   vsthost_lib/scripts/build-android-libs.sh \
                   vsthost_lib/scripts/build-gnutls-android.sh | h16)
          echo "winedeps=winedeps-$os-$WD-ndk${NDK_VSTHOST}" >> "$GITHUB_OUTPUT"

          # X11 client stack is its OWN cached job (built once via the native
          # cmake, restored by the wine + assemble jobs — decoupled from
          # gnutls/freetype). Key tracks the X11 build logic + the 3rd_party/x11
          # submodule pins, scoped to NDK_NATIVE so the cached sysroot matches
          # assemble's build.sh full (which also builds this sysroot).
          X11_K=$( { cat cmake/targets/x11_sysroot.cmake vsthost_lib/scripts/build-all.sh; \
                     git rev-parse HEAD:3rd_party/x11; } | h16)
          echo "x11=x11-$os-$X11_K-ndk${NDK_NATIVE}" >> "$GITHUB_OUTPUT"

          WINE_C=$(gl vsthost_lib/external/wine-upstream)
          WINE_H=$( { find vsthost_lib/patches/wine -type f -name '*.patch' | sort | xargs -r cat; \
                      cat vsthost_lib/scripts/build-wine-pe.sh \
                          vsthost_lib/scripts/build-wine-android.sh \
                          vsthost_lib/scripts/apply-wine-patches.sh; } | h16)
          echo "wine=wine-$os-$WINE_C-$WINE_H-$LLVM_C" >> "$GITHUB_OUTPUT"

          FEX_C=$(gl vsthost_lib/external/fex-upstream)
          FEX_H=$(cat vsthost_lib/scripts/build-fex-pe.sh | h16)
          echo "fex=fex-$os-$FEX_C-$FEX_H-$LLVM_C" >> "$GITHUB_OUTPUT"

          DXVK_C=$(gl vsthost_lib/external/dxvk)
          VKH_C=$(gl vsthost_lib/external/Vulkan-Headers)
          GLSLANG_C=$(gl vsthost_lib/external/glslang)   # build-dxvk.sh builds the glslang compiler
          DXVK_H=$( { find vsthost_lib/patches/dxvk -type f -name '*.patch' 2>/dev/null | sort | xargs -r cat; \
                      cat vsthost_lib/scripts/build-dxvk.sh; } | h16)
          echo "dxvk=dxvk-$os-$DXVK_C-$VKH_C-$GLSLANG_C-$DXVK_H-$LLVM_C" >> "$GITHUB_OUTPUT"

          MESA_C=$(gl 3rd_party/mesa)
          MESA_H=$( { find vsthost_lib/patches/mesa -type f -name '*.patch' 2>/dev/null | sort | xargs -r cat; \
                      cat vsthost_lib/scripts/build-mesa-zink.sh; } | h16)
          echo "mesa=mesa-$os-$MESA_C-$MESA_H-ndk${NDK_VSTHOST}" >> "$GITHUB_OUTPUT"

          echo "── cache keys ──"; cat "$GITHUB_OUTPUT"

  # ── llvm-mingw: the ~30-60 min toolchain. Cached on its submodule commit;
  #    rebuilt only when the submodule moves. Shared (via cache) by wine/fex/dxvk.
  llvm:
    needs: keys
    runs-on: ubuntu-latest
    timeout-minutes: 150
    steps:
      - uses: actions/checkout@v4
      - name: Cache llvm-mingw install
        id: cache
        uses: actions/cache@v4
        with:
          path: vsthost_lib/external/llvm-mingw/install
          key: ${{ needs.keys.outputs.llvm }}
      - name: Free disk space
        if: steps.cache.outputs.cache-hit != 'true'
        uses: jlumbroso/free-disk-space@main
        with: { android: true, tool-cache: false, dotnet: true, haskell: true, large-packages: true, docker-images: true, swap-storage: true }
      - name: Build llvm-mingw
        if: steps.cache.outputs.cache-hit != 'true'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends $COMMON_APT
          # setup-fex-pivot.sh verifies wine/fex/llvm-mingw submodules exist
          # (it only *builds* llvm-mingw). Init the three it checks.
          git submodule update --init \
            vsthost_lib/external/llvm-mingw \
            vsthost_lib/external/wine-upstream \
            vsthost_lib/external/fex-upstream
          cd vsthost_lib && bash scripts/build-all.sh llvm

  # ── x11: the X11 client stack (libX11/xcb/Xau/Xext/Xrender + Xi/Xfixes/
  #    Xrandr/Xcursor/Xxf86vm/Xdmcp) source-built via the native cmake. Built
  #    ONCE here + cached; restored by the wine job (winex11 links it) and
  #    assemble (build.sh full reuses the stamps + sysroot, no rebuild).
  #    Decoupled from winedeps so a gnutls/freetype change doesn't rebuild X11
  #    (and vice versa). NDK_NATIVE matches assemble's native build.
  x11:
    needs: keys
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
      - name: Cache X11 sysroot
        id: x11-cache
        uses: actions/cache@v4
        with:
          path: |
            build/x11_ui
            build/prebuild
          key: ${{ needs.keys.outputs.x11 }}
      - name: System deps + NDK
        if: steps.x11-cache.outputs.cache-hit != 'true'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends $COMMON_APT $X11_APT $NATIVE_APT
          yes | "$ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager" --licenses >/dev/null || true
          "$ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager" "ndk;${NDK_NATIVE}"
      - name: Init native submodules (the cmake configure spans the full 3rd_party tree)
        if: steps.x11-cache.outputs.cache-hit != 'true'
        run: git submodule update --init --recursive 3rd_party
      - name: Build X11 sysroot
        if: steps.x11-cache.outputs.cache-hit != 'true'
        env:
          ANDROID_NDK: ${{ env.ANDROID_SDK_ROOT }}/ndk/${{ env.NDK_NATIVE }}
        run: cd vsthost_lib && bash scripts/build-all.sh x11

  # ── wine: PE (build-arm64ec) + Unix (build-android-arm64). The other long
  #    pole. Two caches: `winedeps` (png-ft/gnutls/headers, rarely changes) and
  #    `wine` (a lean tar of build-android-arm64 for the assemble handoff).
  #    The X11 sysroot it links comes from the `x11` job's cache (restored below).
  wine:
    needs: [keys, llvm, x11]
    runs-on: ubuntu-latest
    timeout-minutes: 300
    steps:
      - uses: actions/checkout@v4
      - name: Cache winedeps (x11 / png+freetype / gnutls)
        id: winedeps-cache
        uses: actions/cache@v4
        with:
          path: |
            vsthost_lib/toolchain/x11-libs
            vsthost_lib/toolchain/x11-headers
            vsthost_lib/toolchain/wine-fonts
            vsthost_lib/toolchain/android-libs
            vsthost_lib/toolchain/gnutls-android-arm64
          key: ${{ needs.keys.outputs.winedeps }}
      - name: Cache wine output (lean build-android-arm64 tar)
        id: wine-cache
        uses: actions/cache@v4
        with:
          path: vsthost_lib/wine-android-out.tar
          key: ${{ needs.keys.outputs.wine }}

      - name: Free disk space
        if: steps.winedeps-cache.outputs.cache-hit != 'true' || steps.wine-cache.outputs.cache-hit != 'true'
        uses: jlumbroso/free-disk-space@main
        with: { android: false, tool-cache: false, dotnet: true, haskell: true, large-packages: true, docker-images: true, swap-storage: true }
      - name: System deps + NDK
        if: steps.winedeps-cache.outputs.cache-hit != 'true' || steps.wine-cache.outputs.cache-hit != 'true'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends $COMMON_APT $X11_APT
          yes | "$ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager" --licenses >/dev/null || true
          "$ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager" "ndk;${NDK_VSTHOST}"

      # winedeps first — wine-android links against them. Network fetch (Termux/upstream).
      # winedeps = freetype/png + gnutls + X11/freetype headers + wine fonts.
      # The X11 client libs themselves come from the `x11` job (restored below).
      - name: Build winedeps
        if: steps.winedeps-cache.outputs.cache-hit != 'true'
        run: cd vsthost_lib && bash scripts/build-all.sh winedeps

      # wine needs the llvm-mingw toolchain (restore the llvm job's cache) + the wine source.
      - name: Restore llvm-mingw
        if: steps.wine-cache.outputs.cache-hit != 'true'
        uses: actions/cache/restore@v4
        with:
          path: vsthost_lib/external/llvm-mingw/install
          key: ${{ needs.keys.outputs.llvm }}
          fail-on-cache-miss: true
      - name: Restore X11 sysroot (from the x11 job; wine links libX11/Xext + dlopens the extensions)
        if: steps.wine-cache.outputs.cache-hit != 'true'
        uses: actions/cache/restore@v4
        with:
          path: |
            build/x11_ui
            build/prebuild
          key: ${{ needs.keys.outputs.x11 }}
          fail-on-cache-miss: true
      - name: Build wine + stage lean output tar
        if: steps.wine-cache.outputs.cache-hit != 'true'
        env:
          ANDROID_NDK: ${{ env.ANDROID_SDK_ROOT }}/ndk/${{ env.NDK_VSTHOST }}
        run: |
          git submodule update --init vsthost_lib/external/wine-upstream
          cd vsthost_lib
          bash scripts/build-all.sh wine
          # Lean handoff: only what pack-wine-fex.py reads from build-android-arm64,
          # minus the .o/.a intermediates (4.0G -> ~1.8G; actions/cache zstd-compresses).
          tar --exclude='*.o' --exclude='*.a' --exclude='*.cross.o' \
              -cf wine-android-out.tar -C external/wine-upstream build-android-arm64
          echo "wine tar: $(du -h wine-android-out.tar | cut -f1)"

  # ── FEX-Emu PE DLLs (libarm64ecfex / libwow64fex). Needs llvm only. ──────
  fex:
    needs: [keys, llvm]
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4
      - name: Cache FEX Bin
        id: cache
        uses: actions/cache@v4
        with:
          path: |
            vsthost_lib/external/fex-upstream/build-arm64ec/Bin
            vsthost_lib/external/fex-upstream/build-wow64/Bin
          key: ${{ needs.keys.outputs.fex }}
      - name: Free disk space
        if: steps.cache.outputs.cache-hit != 'true'
        uses: jlumbroso/free-disk-space@main
        with: { android: true, tool-cache: false, dotnet: true, haskell: true, large-packages: true, docker-images: true, swap-storage: true }
      - name: Restore llvm-mingw
        if: steps.cache.outputs.cache-hit != 'true'
        uses: actions/cache/restore@v4
        with:
          path: vsthost_lib/external/llvm-mingw/install
          key: ${{ needs.keys.outputs.llvm }}
          fail-on-cache-miss: true
      - name: Build FEX
        if: steps.cache.outputs.cache-hit != 'true'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends $COMMON_APT
          git submodule update --init --recursive vsthost_lib/external/fex-upstream
          cd vsthost_lib && bash scripts/build-all.sh fex

  # ── DXVK D3D->Vulkan DLLs -> src/main/assets/dxvk/x64. Needs llvm only. ──
  dxvk:
    needs: [keys, llvm]
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
      - name: Cache DXVK assets
        id: cache
        uses: actions/cache@v4
        with:
          path: vsthost_lib/src/main/assets/dxvk
          key: ${{ needs.keys.outputs.dxvk }}
      - name: Free disk space
        if: steps.cache.outputs.cache-hit != 'true'
        uses: jlumbroso/free-disk-space@main
        with: { android: true, tool-cache: false, dotnet: true, haskell: true, large-packages: true, docker-images: true, swap-storage: true }
      - name: Restore llvm-mingw
        if: steps.cache.outputs.cache-hit != 'true'
        uses: actions/cache/restore@v4
        with:
          path: vsthost_lib/external/llvm-mingw/install
          key: ${{ needs.keys.outputs.llvm }}
          fail-on-cache-miss: true
      - name: Build DXVK
        if: steps.cache.outputs.cache-hit != 'true'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends $COMMON_APT
          git submodule update --init --recursive \
            vsthost_lib/external/dxvk vsthost_lib/external/Vulkan-Headers \
            vsthost_lib/external/glslang
          cd vsthost_lib && bash scripts/build-all.sh dxvk

  # ── Mesa-Zink desktop-GL libs -> mesa-zink-libs.tar.gz. Needs NDK only. ──
  mesa:
    needs: keys
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4
      - name: Cache Mesa-Zink asset
        id: cache
        uses: actions/cache@v4
        with:
          path: vsthost_lib/src/main/assets/mesa-zink-libs.tar.gz
          key: ${{ needs.keys.outputs.mesa }}
      - name: Free disk space
        if: steps.cache.outputs.cache-hit != 'true'
        uses: jlumbroso/free-disk-space@main
        with: { android: false, tool-cache: false, dotnet: true, haskell: true, large-packages: true, docker-images: true, swap-storage: true }
      - name: Build Mesa-Zink
        if: steps.cache.outputs.cache-hit != 'true'
        env:
          ANDROID_NDK: ${{ env.ANDROID_SDK_ROOT }}/ndk/${{ env.NDK_VSTHOST }}
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends $COMMON_APT
          yes | "$ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager" --licenses >/dev/null || true
          "$ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager" "ndk;${NDK_VSTHOST}"
          git submodule update --init 3rd_party/mesa
          cd vsthost_lib && bash scripts/build-all.sh mesa

  # ── Assemble: restore every component cache, build the cheap remainder
  #    (turnip fetch + hosts + pack), build the LV2/native side, assemble the
  #    APK. This is the only job that needs the full submodule tree + both NDKs.
  assemble:
    needs: [keys, wine, fex, dxvk, mesa, x11]
    runs-on: ubuntu-latest
    timeout-minutes: 180
    steps:
      - name: Free disk space
        uses: jlumbroso/free-disk-space@main
        with: { android: false, tool-cache: false, dotnet: true, haskell: true, large-packages: true, docker-images: true, swap-storage: true }
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: System dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends $COMMON_APT $X11_APT $NATIVE_APT

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with: { distribution: temurin, java-version: 17 }

      - name: Install Android SDK components (both NDKs)
        run: |
          SDKMGR="$ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager"
          yes | "$SDKMGR" --licenses >/dev/null || true
          for pkg in "ndk;${NDK_NATIVE}" "ndk;${NDK_VSTHOST}" \
                     "cmake;3.22.1" "platforms;android-34" "build-tools;34.0.0"; do
            "$SDKMGR" "$pkg"
          done

      # ── Restore each component cache (read-only; fail fast if a build job
      #    didn't populate it). These ARE the wine/FEX/DXVK/Mesa build outputs.
      - name: Restore winedeps
        uses: actions/cache/restore@v4
        with:
          path: |
            vsthost_lib/toolchain/x11-libs
            vsthost_lib/toolchain/x11-headers
            vsthost_lib/toolchain/wine-fonts
            vsthost_lib/toolchain/android-libs
            vsthost_lib/toolchain/gnutls-android-arm64
          key: ${{ needs.keys.outputs.winedeps }}
          fail-on-cache-miss: true
      - name: Restore wine output tar
        uses: actions/cache/restore@v4
        with:
          path: vsthost_lib/wine-android-out.tar
          key: ${{ needs.keys.outputs.wine }}
          fail-on-cache-miss: true
      - name: Restore FEX Bin
        uses: actions/cache/restore@v4
        with:
          path: |
            vsthost_lib/external/fex-upstream/build-arm64ec/Bin
            vsthost_lib/external/fex-upstream/build-wow64/Bin
          key: ${{ needs.keys.outputs.fex }}
          fail-on-cache-miss: true
      - name: Restore DXVK assets
        uses: actions/cache/restore@v4
        with:
          path: vsthost_lib/src/main/assets/dxvk
          key: ${{ needs.keys.outputs.dxvk }}
          fail-on-cache-miss: true
      - name: Restore Mesa-Zink asset
        uses: actions/cache/restore@v4
        with:
          path: vsthost_lib/src/main/assets/mesa-zink-libs.tar.gz
          key: ${{ needs.keys.outputs.mesa }}
          fail-on-cache-miss: true
      - name: Restore X11 sysroot (from the x11 job — build.sh full reuses it, no rebuild)
        uses: actions/cache/restore@v4
        with:
          path: |
            build/x11_ui
            build/prebuild
          key: ${{ needs.keys.outputs.x11 }}
          fail-on-cache-miss: true

      - name: Unpack wine output into build dir
        run: |
          tar -xf vsthost_lib/wine-android-out.tar -C vsthost_lib/external/wine-upstream
          test -x vsthost_lib/external/wine-upstream/build-android-arm64/loader/wine

      # ── Native (build.sh full) cache + ccache + gradle — same scheme as ci.yml.
      - name: Compute native cache key
        id: native-key
        run: |
          FILES_HASH=$(cat \
            build.sh \
            $(find cmake -name '*.cmake' -o -name 'CMakeLists.txt' -o -name 'CMakePresets.json' 2>/dev/null | sort) \
            $(find 3rd_party/patches -name '*.patch' 2>/dev/null | sort) \
            2>/dev/null | sha256sum | cut -d' ' -f1)
          SUBMOD_HASH=$(git submodule status | sha256sum | cut -d' ' -f1)
          echo "key=native-${{ runner.os }}-${FILES_HASH}-${SUBMOD_HASH}" >> "$GITHUB_OUTPUT"
      - name: Cache native build (build.sh)
        uses: actions/cache@v4
        with:
          path: |
            build/prebuild
            build/shared
            build/aidadsp
            build/aidax_full
            build/nam
            build/lv2
            build/x11_ui
            build/mesa
            build/fftw3
            build/fftw3-codelets
            build/neuralrack
            build/impulseloader
            build/xdarkterror
            build/xtinyterror
            build/collisiondrive
            build/metaltone
            build/gxcabsim
            build/modamptk
            build/fatfrog
            build/lv2_wrapper
            app/src/main/jniLibs
            app/src/full/jniLibs
            app/src/main/assets
            app/src/main/cpp/libs
            gxplugins_pack/src/main/assets/plugins
            neural_pack/src/main/assets/plugins
            brummer_pack/src/main/assets/plugins
          key: ${{ steps.native-key.outputs.key }}
          # NO restore-keys on purpose. A prefix (partial) restore brings back a
          # stale autotools build tree — e.g. build/x11_ui/libX11 configured with
          # the previous CONFIGURE_ARGS. When the args change (e.g. dropping
          # --disable-xkb), build.sh reconfigures it in place and autotools
          # dirty-reconfigure fails on the runner ("Performing configure step for
          # 'libX11' FAILED"). Exact-key-only means a config change misses the
          # cache and build.sh does a CLEAN build; ccache keeps recompiles fast.
      - name: Cache ccache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ccache
          key: ccache-${{ runner.os }}-${{ github.sha }}
          restore-keys: ccache-${{ runner.os }}-
      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
            ~/.gradle/build-cache
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle.kts', 'gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: gradle-${{ runner.os }}-
      - name: Configure ccache
        run: |
          ccache --set-config=max_size=2G
          ccache --set-config=compression=true
          ccache --zero-stats

      # ── The cheap remainder of the vsthost pipeline against the restored
      #    component outputs: turnip fetch, libadrenotools (NDK CMake from the
      #    submodule → the Turnip HAL hook libs), vst_host/vst3_host/uihost
      #    compiles, pack-wine-fex (-> jniLibs + assets), symbol map.
      - name: Stage vsthost (turnip + adrenotools + hosts + pack)
        env:
          ANDROID_NDK: ${{ env.ANDROID_SDK_ROOT }}/ndk/${{ env.NDK_VSTHOST }}
        run: cd vsthost_lib && bash scripts/build-all.sh turnip adrenotools hosts pack

      - name: Build native libraries (build.sh full)
        env:
          ANDROID_NDK: ${{ env.ANDROID_SDK_ROOT }}/ndk/${{ env.NDK_NATIVE }}
        run: ./build.sh full

      - name: Show ccache stats
        if: always()
        run: ccache --show-stats || true

      - name: Build full debug APK
        run: ./gradlew assembleFullDebug

      - name: Upload full debug APK
        uses: actions/upload-artifact@v4
        with:
          name: gxrc-full-vst-${{ github.sha }}
          path: app/build/outputs/apk/full/debug/*.apk
          if-no-files-found: error
          retention-days: 90

      - name: Dump build logs on failure
        if: failure()
        run: |
          # ExternalProject stamp logs live at <name>-prefix/src/<name>-stamp/*.log
          # (the previous glob '*/src/*/stamp/' never matched and dumped nothing).
          for f in build/prebuild/*/src/*-stamp/*.log; do
            [ -f "$f" ] && echo "=== $f ===" && tail -120 "$f"
          done || true
          # autotools config.log carries the detailed "configure: error:" reason
          for f in build/x11_ui/*/config.log build/*/config.log; do
            [ -f "$f" ] && echo "=== $f ===" && tail -80 "$f"
          done || true
          tail -100 vsthost_lib/external/wine-upstream/build-android-arm64/config.log 2>/dev/null || true
